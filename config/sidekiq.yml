---
:verbose: false
:concurrency: 15
:queues:
  - [critical, 4]
  - [default, 4]
  - [slow, 1]
  - [eea, 4]
  - [epa, 2]

:schedule:
  session_stopped_alerts:
    every: "30m"
    class: SessionStoppedAlertsWorker
    queue: critical

  threshold_exceeded_alerts:
    every: "10m"
    class: "ThresholdAlertsWorker"
    queue: critical

  airnow_import:
    cron: "26,56 * * * *"
    class: AirNowImportWorker
    queue: slow

  update_stream_hourly_averages:
    cron: "1 * * * *"
    class: UpdateStreamHourlyAveragesWorker
    queue: slow

  update_stream_daily_averages:
    cron: "5 * * * *"
    class: UpdateStreamDailyAveragesWorker
    queue: slow

  update_station_stream_daily_averages:
    cron: "2,30 * * * *"
    class: UpdateStationStreamDailyAveragesWorker
    queue: slow

  eea_trigger_ingest:
    cron: "16,40 * * * *"
    class: "Eea::TriggerIngestWorker"
    queue: eea

  eea_update_hourly_averages:
    cron: "26,50 * * * *"
    class: Eea::UpdateHourlyAveragesWorker
    queue: eea

  eea_purge_measurements:
    cron: "0 9 * * *"
    class: Eea::PurgeMeasurementsWorker
    queue: slow

  epa_import_stations:
    cron: "20 * * * *"
    class: "Epa::ImportStationsWorker"
    queue: epa

  epa_trigger_ingest:
    cron: "28,58 * * * *"
    class: "Epa::TriggerIngestWorker"
    queue: epa
